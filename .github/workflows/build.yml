name: build.yml

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: publish-build-branch
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GEOIP_URL: https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/release/geoip.dat
      GEOSITE_URL: https://raw.githubusercontent.com/runetfreedom/russia-blocked-geosite/release/geosite.dat
      PUBLISH_BRANCH: build

    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout geodat2srs
        uses: actions/checkout@v4
        with:
          repository: runetfreedom/geodat2srs
          path: geodat2srs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./geodat2srs/go.mod
          cache: true

      - name: Download source dat files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ./out

          curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            "$GEOIP_URL" -o ./out/geoip.dat

          curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            "$GEOSITE_URL" -o ./out/geosite.dat

      - name: Build geodat2srs
        shell: bash
        run: |
          set -euo pipefail
          go build -C geodat2srs ./

      - name: Generate sing-box srs
        shell: bash
        run: |
          set -euo pipefail

          rm -rf ./tmp
          mkdir -p ./tmp/rule-set-geoip ./tmp/rule-set-geosite ./out/sing-box

          ./geodat2srs/geodat2srs geoip -i ./out/geoip.dat -o ./tmp/rule-set-geoip/
          ./geodat2srs/geodat2srs geosite -i ./out/geosite.dat -o ./tmp/rule-set-geosite/

          cp -f ./tmp/rule-set-geoip/*.srs ./out/sing-box/
          cp -f ./tmp/rule-set-geosite/*.srs ./out/sing-box/

      - name: Prepare publish repo for build branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          TIMESTAMP=$(date +%s)
          echo "TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          echo "DATED_BRANCH=${PUBLISH_BRANCH}-${TIMESTAMP}" >> "$GITHUB_ENV"

          if git ls-remote --exit-code --heads origin "${PUBLISH_BRANCH}" >/dev/null 2>&1; then
            git clone --branch "${PUBLISH_BRANCH}" "${REPO_URL}" publish-repo
          else
            git clone "${REPO_URL}" publish-repo
            cd publish-repo
            git switch --orphan "${PUBLISH_BRANCH}"
            find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
            cd ..
          fi

          cd publish-repo
          git checkout -b "${PUBLISH_BRANCH}-${TIMESTAMP}"

      - name: Publish generated files to build branch
        shell: bash
        run: |
          set -euo pipefail

          find publish-repo -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          mkdir -p publish-repo/sing-box

          cp -f ./out/geoip.dat publish-repo/
          cp -f ./out/geosite.dat publish-repo/
          cp -f ./out/sing-box/*.srs publish-repo/sing-box/

          cat > publish-repo/README.md <<'EOF'
          Auto-generated artifacts branch.

          Contents:
          - geoip.dat
          - geosite.dat
          - sing-box/*.srs
          EOF

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          cd publish-repo

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update build artifacts ${TIMESTAMP}"

          # Push the dated branch
          git push origin "${DATED_BRANCH}"

          # Merge into the main build branch and push
          git checkout "${PUBLISH_BRANCH}"
          git merge --ff-only "${DATED_BRANCH}"
          git push origin "${PUBLISH_BRANCH}"