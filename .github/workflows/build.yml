name: build.yml

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set variables
        shell: bash
        run: |
          echo "RELEASE_NAME=Released on $(date -u +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "TAG_NAME=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "GEOIP_URL=https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/release/geoip.dat" >> "$GITHUB_ENV"
          echo "GEOSITE_URL=https://raw.githubusercontent.com/runetfreedom/russia-blocked-geosite/release/geosite.dat" >> "$GITHUB_ENV"

      - name: Checkout geodat2srs
        uses: actions/checkout@v4
        with:
          repository: runetfreedom/geodat2srs
          path: geodat2srs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./geodat2srs/go.mod

      - name: Download source dat files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./publish
          curl -fsSL "$GEOIP_URL" -o ./publish/geoip.dat
          curl -fsSL "$GEOIP_URL.sha256sum" -o ./publish/geoip.dat.sha256sum
          curl -fsSL "$GEOSITE_URL" -o ./publish/geosite.dat
          curl -fsSL "$GEOSITE_URL.sha256sum" -o ./publish/geosite.dat.sha256sum

      - name: Build geodat2srs
        shell: bash
        run: |
          set -euo pipefail
          go build -C geodat2srs ./

      - name: Generate sing-box srs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./tmp/sing-box/rule-set-geoip
          mkdir -p ./tmp/sing-box/rule-set-geosite

          ./geodat2srs/geodat2srs geoip -i ./publish/geoip.dat -o ./tmp/sing-box/rule-set-geoip/
          ./geodat2srs/geodat2srs geosite -i ./publish/geosite.dat -o ./tmp/sing-box/rule-set-geosite/

      - name: Pack sing-box.zip
        shell: bash
        run: |
          set -euo pipefail
          (
            cd ./tmp/sing-box
            zip -r ../../publish/sing-box.zip .
          )

      - name: Collect individual srs assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./publish/rule-set-geosite ./publish/rule-set-geoip
          cp -f ./tmp/sing-box/rule-set-geosite/*.srs ./publish/rule-set-geosite/
          cp -f ./tmp/sing-box/rule-set-geoip/*.srs ./publish/rule-set-geoip/

      - name: Upload dat and zip assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          file_glob: true
          overwrite: true
          file: ./publish/*.{dat,sha256sum,zip}

      - name: Upload geosite srs assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          file_glob: true
          overwrite: true
          file: ./publish/rule-set-geosite/*.srs

      - name: Upload geoip srs assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          file_glob: true
          overwrite: true
          file: ./publish/rule-set-geoip/*.srs