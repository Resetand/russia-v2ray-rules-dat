name: build.yml

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: publish-build-branch
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GEOIP_URL: https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/release/geoip.dat
      GEOSITE_URL: https://raw.githubusercontent.com/runetfreedom/russia-blocked-geosite/release/geosite.dat
      PUBLISH_BRANCH: build

    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout geodat2srs
        uses: actions/checkout@v4
        with:
          repository: runetfreedom/geodat2srs
          path: geodat2srs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./geodat2srs/go.mod
          cache: true

      - name: Download source dat files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ./out

          curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            "$GEOIP_URL" -o ./out/geoip.dat

          curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            "$GEOSITE_URL" -o ./out/geosite.dat

      - name: Build geodat2srs
        shell: bash
        run: |
          set -euo pipefail
          go build -C geodat2srs ./

      - name: Generate sing-box srs
        shell: bash
        run: |
          set -euo pipefail

          rm -rf ./tmp
          mkdir -p ./tmp/rule-set-geoip ./tmp/rule-set-geosite ./out/sing-box

          ./geodat2srs/geodat2srs geoip -i ./out/geoip.dat -o ./tmp/rule-set-geoip/
          ./geodat2srs/geodat2srs geosite -i ./out/geosite.dat -o ./tmp/rule-set-geosite/

          cp -f ./tmp/rule-set-geoip/*.srs ./out/sing-box/
          cp -f ./tmp/rule-set-geosite/*.srs ./out/sing-box/

      - name: Apply sing-box overrides
        shell: bash
        run: |
          set -euo pipefail

          OVERRIDE_FILE="./sing-box.override.json"
          if [[ ! -f "$OVERRIDE_FILE" ]]; then
            echo "No override file found, skipping"
            exit 0
          fi

          # Install sing-box for decompile/compile
          SING_BOX_VERSION="1.11.0"
          curl --fail --silent --show-error --location \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz" \
            -o /tmp/sing-box.tar.gz
          tar -xzf /tmp/sing-box.tar.gz -C /tmp
          SING_BOX="/tmp/sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box"

          for key in $(jq -r 'keys[]' "$OVERRIDE_FILE"); do
            SRS_FILE="./out/sing-box/${key}.srs"

            if [[ ! -f "$SRS_FILE" ]]; then
              echo "SKIP: ${key}.srs not found"
              continue
            fi

            echo "PATCH: ${key}.srs"

            # Decompile .srs -> .json
            "$SING_BOX" rule-set decompile "$SRS_FILE" -o "/tmp/${key}.json"

            # Merge: append override rules into the existing rule-set
            OVERRIDE_RULES=$(jq -c --arg k "$key" '.[$k].rules' "$OVERRIDE_FILE")
            jq --argjson extra "$OVERRIDE_RULES" '.rules += $extra' "/tmp/${key}.json" > "/tmp/${key}-merged.json"

            # Compile back .json -> .srs
            "$SING_BOX" rule-set compile "/tmp/${key}-merged.json" -o "$SRS_FILE"
          done

      - name: Generate combined geo rule-sets
        shell: bash
        run: |
          set -euo pipefail

          SING_BOX="/tmp/sing-box-1.11.0-linux-amd64/sing-box"
          SRS_DIR="./out/sing-box"

          # Collect all suffixes from geosite-*.srs files
          for geosite_file in "$SRS_DIR"/geosite-*.srs; do
            [[ -f "$geosite_file" ]] || continue

            suffix="${geosite_file##*/geosite-}"
            suffix="${suffix%.srs}"

            geoip_file="$SRS_DIR/geoip-${suffix}.srs"
            [[ -f "$geoip_file" ]] || continue

            echo "COMBINE: geosite-${suffix} + geoip-${suffix} -> geo-${suffix}"

            "$SING_BOX" rule-set decompile "$geosite_file" -o "/tmp/geosite-${suffix}.json"
            "$SING_BOX" rule-set decompile "$geoip_file" -o "/tmp/geoip-${suffix}.json"

            # Merge rules arrays from both rule-sets
            jq -s '{ version: .[0].version, rules: (.[0].rules + .[1].rules) }' \
              "/tmp/geosite-${suffix}.json" "/tmp/geoip-${suffix}.json" \
              > "/tmp/geo-${suffix}.json"

            "$SING_BOX" rule-set compile "/tmp/geo-${suffix}.json" -o "$SRS_DIR/geo-${suffix}.srs"
          done

      - name: Prepare publish repo for build branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          TIMESTAMP=$(date +%s)
          echo "TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          echo "DATED_BRANCH=${PUBLISH_BRANCH}-${TIMESTAMP}" >> "$GITHUB_ENV"

          if git ls-remote --exit-code --heads origin "${PUBLISH_BRANCH}" >/dev/null 2>&1; then
            git clone --branch "${PUBLISH_BRANCH}" "${REPO_URL}" publish-repo
          else
            git clone "${REPO_URL}" publish-repo
            cd publish-repo
            git switch --orphan "${PUBLISH_BRANCH}"
            find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
            cd ..
          fi

          cd publish-repo
          git checkout -b "${PUBLISH_BRANCH}-${TIMESTAMP}"

      - name: Publish generated files to build branch
        shell: bash
        run: |
          set -euo pipefail

          find publish-repo -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          mkdir -p publish-repo/sing-box

          cp -f ./out/geoip.dat publish-repo/
          cp -f ./out/geosite.dat publish-repo/
          cp -f ./out/sing-box/*.srs publish-repo/sing-box/

          cat > publish-repo/README.md <<'EOF'
          Auto-generated artifacts branch.

          Contents:
          - geoip.dat
          - geosite.dat
          - sing-box/*.srs
          EOF

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          cd publish-repo

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update build artifacts ${TIMESTAMP}"

          # Push the dated branch
          git push origin "${DATED_BRANCH}"

          # Merge into the main build branch and push
          git checkout "${PUBLISH_BRANCH}"
          git merge --ff-only "${DATED_BRANCH}"
          git push origin "${PUBLISH_BRANCH}"